version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: improved_mom_backend
    ports:
      - "8000:7860" # Maps localhost:8000 to container:7860
    volumes:
      - .:/app
      - /app/.venv
      - /app/__pycache__
      - /app/uploads
      - /app/temp_recordings
    env_file:
      - .env
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 7860 --reload
